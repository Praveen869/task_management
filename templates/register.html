<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-container glass">
        <div class="auth-header">
            <div class="logo-container" style="justify-content: center; margin-bottom: 1rem;">
                <i data-lucide="layout-grid" style="color: var(--primary); width: 32px; height: 32px;"></i>
                <div class="logo" style="font-size: 2.5rem;">TaskFlow</div>
            </div>
            <p class="auth-subtitle">Join thousands of productive people today.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i data-lucide="user" class="input-icon" style="width: 18px;"></i>
                    <input type="text" name="username" required placeholder="John Doe" style="padding-left: 3rem;">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" class="input-icon" style="width: 18px;"></i>
                    <input type="email" name="email" required placeholder="name@company.com" style="padding-left: 3rem;">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon" style="width: 18px;"></i>
                    <input type="password" name="password" required placeholder="••••••••" style="padding-left: 3rem;">
                </div>
            </div>
            <button type="submit" style="margin-top: 1rem;">
                Create Account <i data-lucide="user-plus" style="width: 18px;"></i>
            </button>
        </form>
        
        <p style="margin-top: 2rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in here</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
